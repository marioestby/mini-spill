<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width='device-width', initial-scale=1.0">
    <link rel="stylesheet" href="wordle.css">
    <link rel="stylesheet" href="general.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="wordle.js"></script>
    <title>Wordle</title>
</head>

<body>
    <header>
        <nav>
            <a href="">Dino spill</a>
            <a href="trepaarad.html">Tre på rad</a>
            <a href="wordle.html"><b>Dagens:</b> Wordle</a>
            <a href="hoved.html" class="home-icon">
                <i class="fa-regular fa-house"></i>
            </a>
        </nav>
    </header>
    <section>
        <div id="popup">
            <h2 id="popup-tittel"></h2>
            <p id="popup-tekst"></p>
            <button onclick="location.reload()">Spill igjen</button>
        </div>



        <h1>Wordle</h1>

        <div id="container-grid"></div>
        <div id="keyboard">
            <div class="keyboard-rad">
                <button data-key="q">q</button>
                <button data-key="w">w</button>
                <button data-key="e">e</button>
                <button data-key="r">r</button>
                <button data-key="t">t</button>
                <button data-key="y">y</button>
                <button data-key="u">u</button>
                <button data-key="i">i</button>
                <button data-key="o">o</button>
                <button data-key="p">p</button>

            </div>
            <div class="keyboard-rad">
                <button data-key="a">a</button>
                <button data-key="s">s</button>
                <button data-key="d">d</button>
                <button data-key="f">f</button>
                <button data-key="g">g</button>
                <button data-key="h">h</button>
                <button data-key="j">j</button>
                <button data-key="k">k</button>
                <button data-key="l">l</button>
            </div>
            <div class="keyboard-rad">
                <button data-key="enter" class="bred-tast">Enter</button>
                <button data-key="z">z</button>
                <button data-key="x">x</button>
                <button data-key="c">c</button>
                <button data-key="v">v</button>
                <button data-key="b">b</button>
                <button data-key="n">n</button>
                <button data-key="m">m</button>
                <button data-key="del" class="bred-tast">Del</button>
            </div>
    </section>
    <footer>

    </footer>


</body>

</html>
